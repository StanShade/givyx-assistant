name: Build ops-dashboard image (GHCR)

# Builds the internal ops dashboard and publishes it to GHCR. It does NOT deploy:
# the VPS pins an explicit tag in givyx.ops/docker-compose.yml, so shipping a new
# build is a deliberate one-line change there rather than an automatic push to prod.
# See Givyx/superpowers/specs/2026-07-21-ops-dashboard-deploy.md (claudeBrain) §4.2.

on:
  push:
    branches: [main]
    paths:
      - "ops-dashboard/**"
      - ".github/workflows/build-ops-dashboard.yml"
  workflow_dispatch:

concurrency:
  group: build-ops-dashboard-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_OWNER: stanshade
  IMAGE_NAME: givyx-ops-dashboard

jobs:
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./ops-dashboard
          file: ./ops-dashboard/Dockerfile
          push: true
          # The VPS is x86_64; the dev Mac is arm64. Pin the platform so a local
          # build can never publish an image the box cannot run.
          platforms: linux/amd64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:ops-${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:ops-latest
          cache-from: type=gha,scope=${{ env.IMAGE_NAME }}
          cache-to: type=gha,mode=max,scope=${{ env.IMAGE_NAME }}

      - name: Report the tag to pin
        run: |
          echo "Pin this in givyx.ops/docker-compose.yml:" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "image: ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.IMAGE_NAME }}:ops-${{ github.sha }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
